<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یوتیوب کلون پیشرفته</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0f0f0f; color: white; padding-bottom: 70px; }
        header { background: #0f0f0f; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: red; display: flex; align-items: center; gap: 5px; }
        .content { margin-top: 60px; padding: 10px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 20px; }
        .video-card { width: 100%; background: #1f1f1f; border-radius: 12px; overflow: hidden; }
        .video-card video { width: 100%; display: block; }
        .video-info { padding: 12px; display: flex; gap: 10px; }
        .channel-avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; }
        .video-details h3 { font-size: 14px; margin-bottom: 5px; color: #fff; }
        .video-details p { font-size: 12px; color: #aaa; }
        
        /* منوی پایین شبیه یوتیوب */
        nav.bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0f0f0f; border-top: 1px solid #272727; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { text-align: center; color: #aaa; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 20px; }
        .plus-btn { background: white; color: black; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo"><i class="fab fa-youtube"></i> VisionSpark</div>
        <div><i class="fas fa-search" style="font-size: 18px;"></i></div>
    </header>

    <div class="content">
        <div class="video-grid" id="mainFeed">
            </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>خانه</a>
        <a href="#" class="nav-item"><i class="fas fa-bolt"></i>Shorts</a>
        <a href="studio.html" class="nav-item"><div class="plus-btn">+</div></a>
        <a href="#" class="nav-item"><i class="fas fa-layer-group"></i>اشتراک‌ها</a>
        <a href="studio.html" class="nav-item"><i class="fas fa-user-circle"></i>استودیو</a>
    </nav>

    <script>
        // لود کردن ویدیوها از حافظه مرورگر برای شبیه‌سازی واقعی
        function loadVideos() {
            const feed = document.getElementById('mainFeed');
            const videos = JSON.parse(localStorage.getItem('uploaded_videos')) || [];
            
            if(videos.length === 0) {
                feed.innerHTML = '<p style="text-align:center; color:#aaa; margin-top:20px;">هیچ ویدیویی منتشر نشده است. از بخش استودیو (+) ویدیو آپلود کنید.</p>';
                return;
            }

            feed.innerHTML = '';
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <video controls src="${video.src}"></video>
                    <div class="video-info">
                        <div class="channel-avatar"></div>
                        <div class="video-details">
                            <h3>${video.title}</h3>
                            <p>کانال کاربران • ${video.views} بازدید • ${video.date}</p>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }
        window.onload = loadVideos;
    </script>
</body>
</html>
